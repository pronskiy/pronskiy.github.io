<script>
(function() {
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  document.querySelectorAll('[data-scramble]').forEach(function(el) {
    var original = el.textContent.trim();
    var queue = [];
    var frame = 0;
    var rafId = null;

    el.addEventListener('mouseenter', function() {
      if (rafId) cancelAnimationFrame(rafId);
      queue = [];
      for (var i = 0; i < original.length; i++) {
        var start = Math.floor(Math.random() * 20);
        var end = start + Math.floor(Math.random() * 20) + 10;
        queue.push({ from: original[i], to: original[i], start: start, end: end, char: null });
      }
      frame = 0;
      update();
    });

    function randomChar() { return chars[Math.floor(Math.random() * chars.length)]; }

    function update() {
      var output = '';
      var complete = 0;
      for (var i = 0; i < queue.length; i++) {
        var item = queue[i];
        if (frame >= item.end) { complete++; output += item.to; }
        else if (frame >= item.start) {
          if (!item.char || Math.random() < 0.28) item.char = randomChar();
          output += item.char;
        } else { output += item.from; }
      }
      el.textContent = output;
      if (complete < queue.length) { frame++; rafId = requestAnimationFrame(update); }
      else { rafId = null; }
    }
  });
})();
</script>
