{% extends 'default' %}

{% block content_wrapper %}
<article class="page">
    <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}
        <p class="subtitle">{{ page.subtitle }}</p>
        {% endif %}
    </header>

    <div class="prose">
        {{ page.blocks.content|raw }}
    </div>
</article>
{% endblock content_wrapper %}
