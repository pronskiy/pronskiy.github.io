<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="{{ site.url }}/favicon.ico">

    <title>{% if ( page.title ) %}{% block title %}{{ page.title }} &mdash; {% endblock %}{% endif %}{{ site.title }} &mdash; {{ site.subtitle }}</title>

    <!-- SEO -->
    <meta name="description" content="{{ page.description }}"/>
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
    <link rel="publisher" href="https://plus.google.com/u/0/+RomanPronskiy0"/>
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ title }}{{ site.title }} &mdash; {{ site.subtitle }}" />
    <meta property="og:description" content="{{ page.description }}" />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:image" content="{{ site.url }}/img/pronskiy.jpg" />
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="604">
    <meta property="og:image:height" content="604">
    <meta name="twitter:card" content="summary"/>
    <meta name="twitter:site" content="@pronskiy"/>
    <meta name="twitter:domain" content="Roman Pronskiy"/>
    <meta name="twitter:creator" content="@pronskiy"/>
    <!-- / SEO -->


    <!-- Bootstrap core CSS -->
    <link href="{{ site.url }}/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <link href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="{{ site.url }}/css/cover.css" rel="stylesheet">

    <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
    <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
                m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

        ga('create', 'UA-22346462-1', 'pronskiy.com');
        ga('send', 'pageview');

    </script>
</head>

<body>

    <div id="wrap">
        <div class="container inner cover site-wrapper">
            {% block content_wrapper %}{% block content %}{% endblock %}{% endblock %}
        </div>
        <div id="push"></div>
    </div>
    <footer id="footer">
        <div class="container text-center">
            <p>&copy; {{ "now"|date("Y") }} {{ site.title }}</p>
        </div>
    </footer>

    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="{{ site.url }}/vendor/jquery/jquery.min.js"></script>
    <script src="{{ site.url }}/vendor/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
